# PPC-Rx Shiny HTTPS reverse proxy (guanglab.org path)
#
# Canonical URL: https://guanglab.org/ppcrx/
# Legacy alias:  https://guanglab.org/ppcsexrx/ -> 301 -> /ppcrx/
#
# Add the block below inside the guanglab.org server { } in
# /etc/nginx/sites-available/jack-research (before location /).

    location = /ppcrx {
        return 301 /ppcrx/;
    }
    location ^~ /ppcrx/ {
        rewrite ^/ppcrx/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3838;
        proxy_redirect / $scheme://$host/ppcrx/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
        client_max_body_size 50M;
    }
    location = /ppcsexrx {
        return 301 /ppcrx/;
    }
    location ^~ /ppcsexrx/ {
        return 301 /ppcrx/$is_args$args;
    }

